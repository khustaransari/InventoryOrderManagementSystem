services:
  - type: web
    name: inventory-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: APP_ENV
        value: production

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: postgres
    plan: free
